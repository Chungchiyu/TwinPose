name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: javascript

      - name: Build examples
        run: npm run build-examples
        working-directory: javascript

      - name: Copy URDF assets
        run: cp -r urdf javascript/example/bundle/urdf

      - name: Copy favicon
        run: cp favicon.ico javascript/example/bundle/favicon.ico

      - name: Add CNAME and disable Jekyll
        run: |
          echo "twinpose.site" > javascript/example/bundle/CNAME
          echo "" > javascript/example/bundle/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: javascript/example/bundle